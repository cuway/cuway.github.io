<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TOP 1 SERVER</title>
    <link href="https://fonts.googleapis.com/css2?family=Anton&display=swap" rel="stylesheet">
    <style>
        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            background-color: #000;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
            font-family: 'Anton', sans-serif;
        }

        .glitch-wrapper {
            position: relative;
            text-align: center;
        }

        .glitch-text {
            font-size: 8vw;
            font-weight: bold;
            color: #fff;
            text-transform: uppercase;
            position: relative;
            text-shadow: 0 0 10px rgba(255, 255, 255, 0.3);
            animation: shake 0.5s infinite;
        }

        .glitch-text::before,
        .glitch-text::after {
            content: attr(data-text);
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: #000;
        }

        .glitch-text::before {
            left: 4px;
            text-shadow: -2px 0 #ff00c1;
            clip: rect(44px, 450px, 56px, 0);
            animation: glitch-anim 5s infinite linear alternate-reverse;
        }

        .glitch-text::after {
            left: -4px;
            text-shadow: -2px 0 #00fff9, 2px 2px #ff00c1;
            clip: rect(44px, 450px, 56px, 0);
            animation: glitch-anim2 5s infinite linear alternate-reverse;
        }

        @keyframes glitch-anim {
            0% { clip: rect(78px, 9999px, 86px, 0); }
            5% { clip: rect(13px, 9999px, 14px, 0); }
            10% { clip: rect(69px, 9999px, 8px, 0); }
            15% { clip: rect(65px, 9999px, 7px, 0); }
            20% { clip: rect(13px, 9999px, 45px, 0); }
            25% { clip: rect(83px, 9999px, 88px, 0); }
            30% { clip: rect(69px, 9999px, 20px, 0); }
            35% { clip: rect(17px, 9999px, 66px, 0); }
            40% { clip: rect(32px, 9999px, 28px, 0); }
            45% { clip: rect(38px, 9999px, 78px, 0); }
            50% { clip: rect(25px, 9999px, 44px, 0); }
            55% { clip: rect(39px, 9999px, 3px, 0); }
            60% { clip: rect(84px, 9999px, 59px, 0); }
            65% { clip: rect(10px, 9999px, 24px, 0); }
            70% { clip: rect(11px, 9999px, 92px, 0); }
            75% { clip: rect(98px, 9999px, 81px, 0); }
            80% { clip: rect(51px, 9999px, 6px, 0); }
            85% { clip: rect(29px, 9999px, 61px, 0); }
            90% { clip: rect(35px, 9999px, 69px, 0); }
            95% { clip: rect(59px, 9999px, 19px, 0); }
            100% { clip: rect(23px, 9999px, 2px, 0); }
        }

        @keyframes glitch-anim2 {
            0% { clip: rect(30px, 9999px, 69px, 0); }
            5% { clip: rect(55px, 9999px, 87px, 0); }
            10% { clip: rect(53px, 9999px, 87px, 0); }
            15% { clip: rect(86px, 9999px, 61px, 0); }
            20% { clip: rect(4px, 9999px, 32px, 0); }
            25% { clip: rect(72px, 9999px, 88px, 0); }
            30% { clip: rect(26px, 9999px, 20px, 0); }
            35% { clip: rect(14px, 9999px, 36px, 0); }
            40% { clip: rect(32px, 9999px, 75px, 0); }
            45% { clip: rect(69px, 9999px, 89px, 0); }
            50% { clip: rect(9px, 9999px, 95px, 0); }
            55% { clip: rect(15px, 9999px, 65px, 0); }
            60% { clip: rect(69px, 9999px, 71px, 0); }
            65% { clip: rect(48px, 9999px, 74px, 0); }
            70% { clip: rect(38px, 9999px, 49px, 0); }
            75% { clip: rect(17px, 9999px, 2px, 0); }
            80% { clip: rect(64px, 9999px, 14px, 0); }
            85% { clip: rect(23px, 9999px, 91px, 0); }
            90% { clip: rect(66px, 9999px, 96px, 0); }
            95% { clip: rect(65px, 9999px, 88px, 0); }
            100% { clip: rect(66px, 9999px, 77px, 0); }
        }
        
        @keyframes shake {
            0% { transform: translate(1px, 1px) rotate(0deg); }
            10% { transform: translate(-1px, -2px) rotate(-1deg); }
            20% { transform: translate(-3px, 0px) rotate(1deg); }
            30% { transform: translate(3px, 2px) rotate(0deg); }
            40% { transform: translate(1px, -1px) rotate(1deg); }
            50% { transform: translate(-1px, 2px) rotate(-1deg); }
            60% { transform: translate(-3px, 1px) rotate(0deg); }
            70% { transform: translate(3px, 1px) rotate(-1deg); }
            80% { transform: translate(-1px, -1px) rotate(1deg); }
            90% { transform: translate(1px, 2px) rotate(0deg); }
            100% { transform: translate(1px, -2px) rotate(-1deg); }
        }

        /* Scanline effect */
        .scanlines {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            background: linear-gradient(
                to bottom,
                rgba(255,255,255,0),
                rgba(255,255,255,0) 50%,
                rgba(0,0,0,0.2) 50%,
                rgba(0,0,0,0.2)
            );
            background-size: 100% 4px;
            pointer-events: none;
            z-index: 99;
        }
    </style>
</head>
<body>
    <div class="scanlines"></div>
    <div class="glitch-wrapper">
        <div class="glitch-text" data-text="CÓ CÁI CON CẶC">CÓ CÁI CON CẶC</div>
    </div>
</body>
</html>
