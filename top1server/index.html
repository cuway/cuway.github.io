<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TOP 1 SERVER</title>
    <link href="https://fonts.googleapis.com/css2?family=Anton&display=swap" rel="stylesheet">
    <style>
        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            background-color: #000;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
            font-family: 'Anton', sans-serif;
        }

        /* Nút mồi để vượt qua cơ chế chặn âm thanh của trình duyệt */
        #start-btn {
            position: absolute;
            z-index: 999;
            padding: 20px 40px;
            font-size: 2vw;
            font-family: 'Anton', sans-serif;
            background-color: #ff003c;
            color: #fff;
            border: 2px solid #fff;
            cursor: pointer;
            text-transform: uppercase;
            box-shadow: 0 0 20px #ff003c;
            animation: pulse-btn 1s infinite alternate;
            transition: 0.2s;
        }

        #start-btn:hover {
            background-color: #fff;
            color: #ff003c;
            transform: scale(1.1);
        }

        @keyframes pulse-btn {
            0% { box-shadow: 0 0 10px #ff003c; }
            100% { box-shadow: 0 0 40px #ff003c, 0 0 80px #ff003c; }
        }

        /* Ẩn chữ chửi lúc đầu */
        .glitch-wrapper {
            position: relative;
            text-align: center;
            display: none;
        }

        .active .glitch-wrapper {
            display: block;
        }

        .glitch-text {
            font-size: 8vw;
            font-weight: bold;
            color: #fff;
            text-transform: uppercase;
            position: relative;
            text-shadow: 0 0 10px rgba(255, 255, 255, 0.3);
            animation: shake 0.1s infinite;
        }

        .glitch-text::before,
        .glitch-text::after {
            content: attr(data-text);
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: #000;
        }

        .glitch-text::before {
            left: 8px;
            text-shadow: -4px 0 #ff00c1;
            clip: rect(44px, 450px, 56px, 0);
            animation: glitch-anim 2s infinite linear alternate-reverse;
        }

        .glitch-text::after {
            left: -8px;
            text-shadow: -4px 0 #00fff9, 4px 4px #ff00c1;
            clip: rect(44px, 450px, 56px, 0);
            animation: glitch-anim2 2s infinite linear alternate-reverse;
        }

        /* Hiệu ứng chớp màn hình cực gắt */
        .active {
            animation: flash-bg 0.1s infinite;
        }

        @keyframes flash-bg {
            0% { background-color: #000; }
            50% { background-color: #ff0000; }
            100% { background-color: #fff; }
        }

        @keyframes glitch-anim {
            0% { clip: rect(78px, 9999px, 86px, 0); }
            5% { clip: rect(13px, 9999px, 14px, 0); }
            10% { clip: rect(69px, 9999px, 8px, 0); }
            15% { clip: rect(65px, 9999px, 7px, 0); }
            20% { clip: rect(13px, 9999px, 45px, 0); }
            25% { clip: rect(83px, 9999px, 88px, 0); }
            30% { clip: rect(69px, 9999px, 20px, 0); }
            35% { clip: rect(17px, 9999px, 66px, 0); }
            40% { clip: rect(32px, 9999px, 28px, 0); }
            45% { clip: rect(38px, 9999px, 78px, 0); }
            50% { clip: rect(25px, 9999px, 44px, 0); }
            55% { clip: rect(39px, 9999px, 3px, 0); }
            60% { clip: rect(84px, 9999px, 59px, 0); }
            65% { clip: rect(10px, 9999px, 24px, 0); }
            70% { clip: rect(11px, 9999px, 92px, 0); }
            75% { clip: rect(98px, 9999px, 81px, 0); }
            80% { clip: rect(51px, 9999px, 6px, 0); }
            85% { clip: rect(29px, 9999px, 61px, 0); }
            90% { clip: rect(35px, 9999px, 69px, 0); }
            95% { clip: rect(59px, 9999px, 19px, 0); }
            100% { clip: rect(23px, 9999px, 2px, 0); }
        }

        @keyframes glitch-anim2 {
            0% { clip: rect(30px, 9999px, 69px, 0); }
            5% { clip: rect(55px, 9999px, 87px, 0); }
            10% { clip: rect(53px, 9999px, 87px, 0); }
            15% { clip: rect(86px, 9999px, 61px, 0); }
            20% { clip: rect(4px, 9999px, 32px, 0); }
            25% { clip: rect(72px, 9999px, 88px, 0); }
            30% { clip: rect(26px, 9999px, 20px, 0); }
            35% { clip: rect(14px, 9999px, 36px, 0); }
            40% { clip: rect(32px, 9999px, 75px, 0); }
            45% { clip: rect(69px, 9999px, 89px, 0); }
            50% { clip: rect(9px, 9999px, 95px, 0); }
            55% { clip: rect(15px, 9999px, 65px, 0); }
            60% { clip: rect(69px, 9999px, 71px, 0); }
            65% { clip: rect(48px, 9999px, 74px, 0); }
            70% { clip: rect(38px, 9999px, 49px, 0); }
            75% { clip: rect(17px, 9999px, 2px, 0); }
            80% { clip: rect(64px, 9999px, 14px, 0); }
            85% { clip: rect(23px, 9999px, 91px, 0); }
            90% { clip: rect(66px, 9999px, 96px, 0); }
            95% { clip: rect(65px, 9999px, 88px, 0); }
            100% { clip: rect(66px, 9999px, 77px, 0); }
        }
        
        @keyframes shake {
            0% { transform: translate(3px, 3px) rotate(0deg) scale(1); }
            10% { transform: translate(-3px, -5px) rotate(-3deg) scale(1.1); }
            20% { transform: translate(-6px, 0px) rotate(3deg) scale(0.9); }
            30% { transform: translate(6px, 5px) rotate(0deg) scale(1.2); }
            40% { transform: translate(3px, -3px) rotate(3deg) scale(1); }
            50% { transform: translate(-3px, 5px) rotate(-3deg) scale(1.1); }
            60% { transform: translate(-6px, 3px) rotate(0deg) scale(0.9); }
            70% { transform: translate(6px, 3px) rotate(-3deg) scale(1.2); }
            80% { transform: translate(-3px, -3px) rotate(3deg) scale(1); }
            90% { transform: translate(3px, 5px) rotate(0deg) scale(1.1); }
            100% { transform: translate(3px, -5px) rotate(-3deg) scale(0.9); }
        }

        .scanlines {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            background: linear-gradient(
                to bottom,
                rgba(255,255,255,0),
                rgba(255,255,255,0) 50%,
                rgba(0,0,0,0.4) 50%,
                rgba(0,0,0,0.4)
            );
            background-size: 100% 4px;
            pointer-events: none;
            z-index: 99;
        }
    </style>
</head>
<body>
    <button id="start-btn">NHẤN VÀO ĐỂ NHẬN TOP 1 SERVER</button>
    
    <div class="scanlines"></div>
    <div class="glitch-wrapper">
        <div class="glitch-text" data-text="CÓ CÁI CON CẶC">CÓ CÁI CON CẶC</div>
    </div>

    <script>
        // Tạo âm thanh chói tai (Ear Rape) bằng Web Audio API
        function playEarRape() {
            const AudioContext = window.AudioContext || window.webkitAudioContext;
            const ctx = new AudioContext();
            
            // Các tần số siêu chói (Square wave & Sawtooth wave)
            const freqs = [3500, 4200, 8000, 8100, 10000];
            
            freqs.forEach(f => {
                const osc = ctx.createOscillator();
                osc.type = f > 5000 ? 'square' : 'sawtooth';
                osc.frequency.value = f;
                
                const gain = ctx.createGain();
                gain.gain.value = 1.0; // Volume max
                
                // Tạo hiệu ứng giật (Strobe) cực khó chịu
                const lfo = ctx.createOscillator();
                lfo.type = 'square';
                lfo.frequency.value = Math.random() * 20 + 10; // 10Hz - 30Hz rung
                
                const lfoGain = ctx.createGain();
                lfoGain.gain.value = 1;
                lfo.connect(gain.gain);
                lfo.start();
                
                osc.connect(gain);
                gain.connect(ctx.destination);
                osc.start();
            });
        }

        document.getElementById('start-btn').addEventListener('click', function() {
            // Ẩn nút
            this.style.display = 'none';
            // Kích hoạt hiệu ứng hình ảnh
            document.body.classList.add('active');
            // Kích hoạt âm thanh chói tai
            playEarRape();
        });
    </script>
</body>
</html>
